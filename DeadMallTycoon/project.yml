name: DeadMallTycoon
options:
  bundleIdPrefix: com.rigtech
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true
  developmentLanguage: en
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "2"
    SUPPORTS_MACCATALYST: "NO"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
    DEVELOPMENT_TEAM: ""
targets:
  DeadMallTycoon:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rigtech.deadmalltycoon
        PRODUCT_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "Dead Mall Tycoon"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UIRequiresFullScreen: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "2"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_PREVIEWS: "YES"
  DeadMallTycoonTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/DeadMallTycoonTests
    dependencies:
      - target: DeadMallTycoon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rigtech.deadmalltycoon.tests
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
schemes:
  DeadMallTycoon:
    build:
      targets:
        DeadMallTycoon: all
        DeadMallTycoonTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DeadMallTycoonTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
